<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Skaner Kaucji</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    video {
      width: 90%;
      border-radius: 10px;
      margin-top: 10px;
    }

    button {
      padding: 15px;
      margin: 10px;
      font-size: 18px;
    }

    #status {
      font-size: 22px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h1>Skaner Kaucji</h1>

<video id="camera" autoplay playsinline></video>

<div id="status">Gotowe</div>

<button onclick="scan()">Skanuj</button>
<button onclick="finish()">Zakończ</button>

<h2>Licznik: <span id="money">0.00</span> zł</h2>

<script>
let money = 0;
let stream;

const video = document.getElementById("camera");

// uruchom kamerę
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(s => {
    stream = s;
    video.srcObject = stream;
});

// canvas do zdjęcia
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

// „AI” – prosta analiza obrazu (symulacja rozpoznania etykiety)
function detectDepositFromImage() {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    let brightPixels = 0;

    for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        // wykrywanie jasnych elementów (np. etykieta "kaucja")
        if (r > 200 && g > 200 && b > 200) {
            brightPixels++;
        }
    }

    const ratio = brightPixels / (data.length / 4);

    // próg – możesz zmieniać
    return ratio > 0.18;
}

function scan() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // robimy zdjęcie
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // zatrzymujemy kamerę na czas analizy
    stream.getTracks().forEach(track => track.stop());

    document.getElementById("status").innerText = "Analizuję...";

    setTimeout(() => {
        const hasDeposit = detectDepositFromImage();

        if (hasDeposit) {
            document.getElementById("status").innerText = "Kaucja wykryta (+0.50 zł)";
            money += 0.5;
        } else {
            document.getElementById("status").innerText = "Brak kaucji (+0.10 zł)";
            money += 0.1;
        }

        document.getElementById("money").innerText = money.toFixed(2);

        // ponownie uruchom kamerę
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => {
            stream = s;
            video.srcObject = stream;
        });

    }, 1000);
}

function finish() {
    document.body.innerHTML = `
        <h1>Podsumowanie</h1>
        <h2>Zarobiono: ${money.toFixed(2)} zł</h2>
    `;
}
</script>

</body>
</html>
