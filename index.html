<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Skaner Kaucji AI</title>

  <!-- OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    body { text-align:center; background:#111; color:white; font-family:Arial; }
    video { width:90%; border-radius:10px; }
    button { padding:15px; margin:10px; font-size:18px; }
  </style>
</head>
<body>

<h1>Skaner Kaucji (AI)</h1>

<video id="camera" autoplay playsinline></video>

<br>

<button onclick="scan()">Skanuj</button>

<h2 id="status">Gotowe</h2>
<h2>Saldo: <span id="money">0.00</span> zł</h2>

<script>
let money = 0;
let stream;

const video = document.getElementById("camera");

// kamera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(s => {
  stream = s;
  video.srcObject = s;
});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

async function scan() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  document.getElementById("status").innerText = "Czytam tekst...";

  const result = await Tesseract.recognize(
    canvas,
    'pol+eng'
  );

  const text = result.data.text.toLowerCase();

  console.log(text);

  if (text.includes("kaucja")) {
    money += 0.5;
    document.getElementById("status").innerText = "Kaucja wykryta (+0.50 zł)";
  } else {
    money += 0.1;
    document.getElementById("status").innerText = "Brak kaucji (+0.10 zł)";
  }

  document.getElementById("money").innerText = money.toFixed(2);
}
</script>

</body>
</html>
